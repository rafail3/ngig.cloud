name: PR Title

# We squash-merge, so the PR title becomes the commit message that
# release-please reads for versioning. Enforce Conventional Commits on the
# title so a mistyped header never produces a wrong (or missing) release.

on:
  pull_request_target:
    types: [opened, edited, synchronize, reopened]

permissions:
  pull-requests: read

jobs:
  validate:
    name: Validate Conventional Commit title
    runs-on: ubuntu-latest
    steps:
      - uses: amannn/action-semantic-pull-request@v6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          # Full standard Conventional Commit set. release-please maps
          # feat -> minor, fix -> patch; the rest are no-release by default.
          types: |
            feat
            fix
            docs
            style
            refactor
            perf
            test
            build
            ci
            chore
            revert
          # Scope is optional and unrestricted (any scope allowed).
          requireScope: false
          # Subject must be present and start lowercase.
          subjectPattern: ^(?![A-Z]).+$
          subjectPatternError: |
            The subject "{subject}" of PR title "{title}" must not be empty and
            must start with a lowercase letter.
