name: release-please

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          token: ${{ secrets.RELEASE_PLEASE_TOKEN }}
          release-type: node

      # Auto-merge the release PR so versioning is fully hands-off.
      # Merges once required status checks (Lint & Build) pass.
      - name: Enable auto-merge on the release PR
        if: ${{ steps.release.outputs.pr }}
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PLEASE_TOKEN }}
          # Pass the PR JSON via env, not inline ${{ }} in the script — otherwise
          # an apostrophe or paren in the release notes breaks the shell quoting
          # (and it's an injection risk). Env values are never parsed by the shell.
          PR_JSON: ${{ steps.release.outputs.pr }}
        run: |
          PR_NUMBER=$(jq -r '.number' <<< "$PR_JSON")
          gh pr merge "$PR_NUMBER" --auto --squash --repo "${{ github.repository }}"
